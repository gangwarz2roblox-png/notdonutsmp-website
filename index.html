<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NotDonutSMP | Welcome</title>
    <link rel="icon" href="img/bcGCsev.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111111;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: silver;
        }

        a { color: white; text-decoration: none; }
        img { max-width: 100%; }

        /* ── HOME CONTENTS ── */
        .home-contents {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            margin-top: 5%;
            padding: 0 20px 60px;
        }

        .relative { position: relative; }
        .group { cursor: pointer; }
        .group:hover img { opacity: 0.92; }

        /* ── LOGO CARD ── */
        .logo-img-home {
            background-color: #00b4ff;
            height: 230px;
            padding: 30px 60px;
            border-radius: 24px;
            display: block;
        }

        .below-logo { margin-top: 12px; }

        .ip-home {
            background: #1e1e1e;
            padding: 10px 18px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            border-radius: 32px;
            text-transform: uppercase;
            cursor: pointer;
            display: inline-flex;
            width: 100%;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border: none;
            font-family: 'Inter', sans-serif;
            transition: background .15s;
        }
        .ip-home:hover { background: #252830; color: #036fff; }

        /* ── STORE / STATS / JOIN IMAGES ── */
        .store-img-home, .join-img-home, .stats-img-home {
            height: 300px;
            border-radius: 24px;
            display: block;
            transition: transform .2s;
        }
        .stats-img-home { transform: scaleX(-1); }
        .group:hover .store-img-home,
        .group:hover .join-img-home { transform: scale(1.02); }
        .group:hover .stats-img-home { transform: scaleX(-1) scale(1.02); }

        /* ── LABEL OVERLAY ── */
        .img-text-home {
            position: absolute;
            top: 0; left: 0;
            padding: 18px 22px;
            z-index: 1;
            color: white;
        }

        .img-text-home > h2 {
            font-weight: 800;
            font-size: 22px;
            text-shadow: 1px 1px 24px black;
        }

        /* ── DISCORD CARD ── */
        .discord-card-home {
            display: flex;
            align-items: center;
            background: #1e1e1e;
            height: 300px;
            justify-content: center;
            flex-direction: column;
            width: 220px;
            border-radius: 24px;
            gap: 6px;
            transition: background .15s;
        }
        .group:hover .discord-card-home { background: #252830; }

        .discord-img-home { width: 60px; }

        .discord-count {
            color: white;
            font-size: 32px;
            margin-top: 8px;
            font-weight: 800;
        }

        .discord-message {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 600;
        }

        /* ── OWNERS CARD (replaces video) ── */
        .owners-card-home {
            background: #1e1e1e;
            height: 300px;
            border-radius: 24px;
            width: 260px;
            display: flex;
            flex-direction: column;
            padding: 22px;
            justify-content: space-between;
            transition: background .15s;
        }
        .group:hover .owners-card-home { background: #252830; }

        .owners-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 16px;
        }

        .owner-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .owner-row:last-of-type { border-bottom: none; }

        .owner-skin-sm {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            background: #2a2a2a;
        }
        .owner-skin-sm img { width: 100%; height: 100%; object-fit: cover; }

        .owner-info-sm .name { font-size: 15px; font-weight: 700; color: white; margin-bottom: 4px; }

        .badge-sm {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 999px;
        }
        .b-owner   { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
        .b-coowner { background: rgba(251,146,60,0.15);  color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }

        .view-staff-link {
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            display: block;
            margin-top: auto;
            padding-top: 12px;
            transition: color .15s;
        }
        .view-staff-link:hover { color: rgba(255,255,255,0.6); }

        /* ── FOOTER ── */
        #foot {
            color: grey;
            background: #1e1e1e;
            padding: 40px 0;
            text-align: center;
            margin-top: auto;
        }

        #foot .copyright {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #foot .copyright-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            text-transform: uppercase;
            font-weight: 700;
            color: white;
        }

        #foot .copyright-text img { width: 32px; border-radius: 8px; }
        #foot small { font-size: 12px; color: #7a7a7a; display: block; }

        #foot .copyright-links {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 10px;
            text-transform: uppercase;
            flex-wrap: wrap;
            justify-content: center;
        }
        #foot .copyright-links a { color: #a7b2c1; transition: color .15s; }
        #foot .copyright-links a:hover { color: white; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #036fff;
            color: white;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- MAIN CONTENT -->
<div class="home-contents">

    <!-- LOGO + IP -->
    <div class="relative">
        <a href="store.html">
            <img class="logo-img-home" src="img/logo.png" alt="NotDonutSMP">
        </a>
        <div class="below-logo">
            <button class="ip-home" onclick="copyIP()">
                <i>⧉</i> play.notdonutsmp.com
            </button>
        </div>
    </div>

    <!-- STORE IMAGE -->
    <div class="relative group">
        <a href="store.html">
            <div class="img-text-home">
                <h2>Store</h2>
            </div>
            <img class="store-img-home" src="img/store.png" alt="Store">
        </a>
    </div>

    <!-- DISCORD CARD -->
    <div class="relative group">
        <a href="https://discord.gg/zdaUByyf4b" target="_blank">
            <div class="discord-card-home">
                <img class="discord-img-home" src="img/discord.png" alt="Discord">
                <span class="discord-count">Join Us</span>
                <span class="discord-message"><span style="color:#4ade80;padding-right:4px">●</span>Discord Community</span>
            </div>
        </a>
    </div>

    <!-- STATS IMAGE -->
    <div class="relative group">
        <a href="staff.html">
            <div class="img-text-home">
                <h2>Staff</h2>
            </div>
            <img class="stats-img-home" src="img/stats.png" alt="Staff">
        </a>
    </div>

    <!-- OWNERS CARD -->
    <div class="relative group">
        <a href="staff.html">
            <div class="owners-card-home">
                <div>
                    <div class="owners-title">Server Owners</div>
                    <div class="owner-row">
                        <div class="owner-skin-sm">
                            <img src="https://minotar.net/helm/DRDeathMC/80" alt="DRDeathMC">
                        </div>
                        <div class="owner-info-sm">
                            <div class="name">DRDeathMC</div>
                            <span class="badge-sm b-owner">Owner</span>
                        </div>
                    </div>
                    <div class="owner-row">
                        <div class="owner-skin-sm">
                            <img src="https://minotar.net/helm/ItzBebeOnMC/80" alt="ItzBebeOnMC">
                        </div>
                        <div class="owner-info-sm">
                            <div class="name">ItzBebeOnMC</div>
                            <span class="badge-sm b-coowner">Co-Owner</span>
                        </div>
                    </div>
                </div>
                <a href="staff.html" class="view-staff-link">View Full Staff →</a>
            </div>
        </a>
    </div>

</div>

<!-- FOOTER -->
<div id="foot">
    <div class="copyright">
        <div class="copyright-text">
            <img src="img/bcGCsev.png" alt="">
            <strong>NotDonutSMP</strong>
        </div>
        <small>Not associated with Mojang or Microsoft</small>
        <small>© 2026 NotDonutSMP. All Rights Reserved.</small>
        <div class="copyright-links">
            <a href="rules.html">Rules</a>
            <a href="staff.html">Staff</a>
            <a href="store.html">Store</a>
            <a href="https://discord.gg/zdaUByyf4b" target="_blank">Discord</a>
        </div>
    </div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<script>
function copyIP() {
    navigator.clipboard.writeText('play.notdonutsmp.com').then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    });
}
</script>

</body>
</html>
